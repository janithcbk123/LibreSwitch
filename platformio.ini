; =====================================================================
;  platformio.ini — BK7231N smart-switch firmware (production)
; ---------------------------------------------------------------------
;  LibreTiny + Arduino on the generic BK7231N (Tuya) board. Build config
;  carries forward the hard-won R-0 findings (UART routing especially).
;  The flash map is FIXED by the platform (Phase 4 ERRATUM): app, the
;  664 KB OTA download slot, KVS @ 0x1D8000, userdata @ 0x1E3000 — we do
;  not (cannot) relocate these; FlashDB binds to the platform regions.
; =====================================================================

[platformio]
src_dir = src
default_envs = bk7231n

[env:bk7231n]
platform   = libretiny
board      = generic-bk7231n-qfn32-tuya   ; CB3S module (BK7231N inside)
framework  = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -std=gnu++17
    ; Mark this as a real LibreTiny device build so our on-device-only
    ; files (HAL/FlashDB/FreeRTOS impls, composition root) compile in.
    -D LT_BUILD=1
    ; FlashDB is compiled in; our KvStore impl keys off this flag too.
    -D FLASHDB_USING=1
    ; --- R-0 FINDING: route the LibreTiny logger + our diagnostics to
    ; UART1. Default Serial maps to UART2; the bench terminal is UART1.
    ; Without this, boot/fault logs are invisible on the bench. ---
    -D LT_UART_DEFAULT_LOGGER=1
    -D LT_LOG_HEAP=1
    ; Keep logs useful during bring-up; lower in production releases.
    -D LT_LOGLEVEL=2
    ; Touch pads on this board idle HIGH (confirmed on-device: all channels
    ; read "pressed" at boot with ActiveHigh). Comment out if a board reads
    ; idle LOW instead.
    -D TOUCH_ACTIVE_LOW
    ; --- ONE-TIME BRING-UP SEED: writes the profile_id byte on boot, then
    ; continues to normal boot. 4 = switch_4g (use your gang count: 1/2/3/4).
    ; *** REMOVE this line and reflash once you see "[seed] ... written OK"
    ; and "[cr] profile resolved" — leaving it re-seeds every boot. ***
    ; -D SEED_PROFILE_ID=4   ; (uncomment ONLY for first boot of a fresh device)

build_unflags =
    -std=gnu++11
    -std=gnu++14

; Production dependencies. FlashDB is NOT here — the LibreTiny PLATFORM
; bundles it (library-flashdb) AND auto-generates the FAL partition table
; from the board flash map (partitions: app/download/kvs/userdata). We use
; the platform's FlashDB + partitions directly; no vendoring needed.
lib_deps =
    knolleary/PubSubClient @ ^2.8      ; MQTT (Phase 6), 512 B buffer set in code

; FlashDB partition config is provided in code via the FAL table
; (see src/platform/fal_cfg.h) bound to the platform's fixed kvs/userdata
; regions. No partition override here — the bootloader owns the map.

; ---------------------------------------------------------------------
;  RELEASE-GATE REMINDERS (Phase 8 / Phase 10), enforced by build checks
;  in CI before a production tag — NOT by this dev env:
;   R-22: the LibreTiny default OTA key/iv ("0123…") are PLACEHOLDERS and
;         are visible in the platform config. Production builds MUST
;         override build.bkota.key/iv. Shipping the default = public OTA
;         packaging keys.
;   R-23: the Ed25519 OTA SIGNING key must come from an HSM/CI signer,
;         never the repo.
;  These are fail-closed checks in the release pipeline (Phase 10 D2).
; ---------------------------------------------------------------------
