<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .mono   { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .fn     { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .gp     { font-size: 13px; font-weight: 700; fill: #334155; }
      .col    { font-size: 12px; font-weight: 700; fill: #64748b; letter-spacing: .08em; }
      .lead   { stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="920" height="620" fill="#ffffff"/>

  <!-- header -->
  <rect width="920" height="58" fill="#0f2a43"/>
  <text x="28" y="36" font-size="20" font-weight="700" fill="#ffffff">CB3S (BK7231N) pin map</text>
  <text x="892" y="36" font-size="13" fill="#9fc0e0" text-anchor="end" class="mono">LibreSwitch &#183; confirmed pinout</text>

  <!-- column headers -->
  <text x="156" y="92" text-anchor="middle" class="col">INPUTS / FLASH</text>
  <text x="764" y="92" text-anchor="middle" class="col">OUTPUTS</text>

  <!-- module -->
  <rect x="360" y="120" width="200" height="430" rx="14" fill="#0f2a43"/>
  <text x="460" y="320" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">CB3S</text>
  <text x="460" y="346" text-anchor="middle" font-size="14" fill="#9fc0e0" class="mono">BK7231N</text>
  <text x="460" y="372" text-anchor="middle" font-size="12" fill="#9fc0e0">3.3 V I/O</text>

  <!-- leads left -->
  <line class="lead" x1="256" y1="150" x2="360" y2="150"/>
  <line class="lead" x1="256" y1="200" x2="360" y2="200"/>
  <line class="lead" x1="256" y1="250" x2="360" y2="250"/>
  <line class="lead" x1="256" y1="300" x2="360" y2="300"/>
  <line class="lead" x1="256" y1="372" x2="360" y2="372"/>
  <line class="lead" x1="256" y1="422" x2="360" y2="422"/>
  <line class="lead" x1="256" y1="472" x2="360" y2="472"/>
  <!-- leads right -->
  <line class="lead" x1="560" y1="150" x2="664" y2="150"/>
  <line class="lead" x1="560" y1="200" x2="664" y2="200"/>
  <line class="lead" x1="560" y1="250" x2="664" y2="250"/>
  <line class="lead" x1="560" y1="300" x2="664" y2="300"/>
  <line class="lead" x1="560" y1="372" x2="664" y2="372"/>
  <line class="lead" x1="560" y1="422" x2="664" y2="422"/>

  <!-- LEFT chips -->
  <!-- touch -->
  <g>
    <rect x="56" y="132" width="200" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="76" cy="150" r="6" fill="#0d9488"/><text x="92" y="155" class="fn">Touch 1</text><text x="244" y="155" text-anchor="end" class="gp mono">GPIO24</text>
  </g>
  <g>
    <rect x="56" y="182" width="200" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="76" cy="200" r="6" fill="#0d9488"/><text x="92" y="205" class="fn">Touch 2</text><text x="244" y="205" text-anchor="end" class="gp mono">GPIO20</text>
  </g>
  <g>
    <rect x="56" y="232" width="200" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="76" cy="250" r="6" fill="#0d9488"/><text x="92" y="255" class="fn">Touch 3</text><text x="244" y="255" text-anchor="end" class="gp mono">GPIO7</text>
  </g>
  <g>
    <rect x="56" y="282" width="200" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="76" cy="300" r="6" fill="#0d9488"/><text x="92" y="305" class="fn">Touch 4</text><text x="244" y="305" text-anchor="end" class="gp mono">GPIO14</text>
  </g>
  <!-- uart / cen -->
  <g>
    <rect x="56" y="354" width="200" height="36" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <circle cx="76" cy="372" r="6" fill="#475569"/><text x="92" y="377" class="fn">UART1 RX1</text><text x="244" y="377" text-anchor="end" class="gp mono">GPIO10</text>
  </g>
  <g>
    <rect x="56" y="404" width="200" height="36" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <circle cx="76" cy="422" r="6" fill="#475569"/><text x="92" y="427" class="fn">UART1 TX1</text><text x="244" y="427" text-anchor="end" class="gp mono">GPIO11</text>
  </g>
  <g>
    <rect x="56" y="454" width="200" height="36" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="76" cy="472" r="6" fill="#7c3aed"/><text x="92" y="477" class="fn">CEN</text><text x="244" y="477" text-anchor="end" class="gp">reset</text>
  </g>

  <!-- RIGHT chips -->
  <!-- relays -->
  <g>
    <rect x="664" y="132" width="200" height="36" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="684" cy="150" r="6" fill="#d97706"/><text x="700" y="155" class="fn">Relay 1</text><text x="852" y="155" text-anchor="end" class="gp mono">GPIO6</text>
  </g>
  <g>
    <rect x="664" y="182" width="200" height="36" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="684" cy="200" r="6" fill="#d97706"/><text x="700" y="205" class="fn">Relay 2</text><text x="852" y="205" text-anchor="end" class="gp mono">GPIO8</text>
  </g>
  <g>
    <rect x="664" y="232" width="200" height="36" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="684" cy="250" r="6" fill="#d97706"/><text x="700" y="255" class="fn">Relay 3</text><text x="852" y="255" text-anchor="end" class="gp mono">GPIO9</text>
  </g>
  <g>
    <rect x="664" y="282" width="200" height="36" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="684" cy="300" r="6" fill="#d97706"/><text x="700" y="305" class="fn">Relay 4</text><text x="852" y="305" text-anchor="end" class="gp mono">GPIO26</text>
  </g>
  <!-- indicators -->
  <g>
    <rect x="664" y="354" width="200" height="36" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <circle cx="684" cy="372" r="6" fill="#ca8a04"/><text x="700" y="377" class="fn">Status LED</text><text x="852" y="377" text-anchor="end" class="gp mono">GPIO22</text>
  </g>
  <g>
    <rect x="664" y="404" width="200" height="36" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="684" cy="422" r="6" fill="#8b5cf6"/><text x="700" y="427" class="fn">Backlight</text><text x="852" y="427" text-anchor="end" class="gp mono">GPIO23</text>
  </g>

  <!-- notes -->
  <rect x="56" y="520" width="808" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="72" y="544" font-size="13" fill="#334155">&#8226; Gang order: <tspan font-weight="700">Touch n drives Relay n</tspan> &#8212; both indexed 1&#8230;4 in the lists above.</text>
  <text x="72" y="566" font-size="13" fill="#334155">&#8226; Do <tspan font-weight="700">not</tspan> enable I2C1 / SPI0 &#8212; they would steal GPIO20 &amp; GPIO14 (R-31).</text>
  <text x="72" y="588" font-size="13" fill="#334155">&#8226; Backlight (GPIO23) is on/off only &#8212; not PWM-capable on this HW (R-32). All pins overridable by build flag.</text>
</svg>
